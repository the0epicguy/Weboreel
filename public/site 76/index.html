<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Blueprint</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blueprint-bg"></div>
    <svg class="mechanical-drawing" width="100%" height="100%">
        <!-- Lines updated by JS -->
    </svg>
    
    <div class="ui-panel">
        <div class="data-row">
            <span class="label">X-AXIS CALIBRATION</span>
            <span class="value" id="val-x">000.00</span>
        </div>
        <div class="data-row">
            <span class="label">Y-AXIS CALIBRATION</span>
            <span class="value" id="val-y">000.00</span>
        </div>
        <div class="data-row">
            <span class="label">TENSION</span>
            <span class="value" id="val-t">NORMAL</span>
        </div>
    </div>
    
    <div class="center-module">
        <div class="crosshair"></div>
        <h1>CORE MECHANISM</h1>
        <p>AWAITING INTERACTION</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
