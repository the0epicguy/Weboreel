<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DATAVERSE - An immersive 3D data visualization universe">
<title>DATAVERSE — Data Universe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@200;300;400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#07080f;overflow:hidden;color:#c8d0e0;font-family:'Outfit',sans-serif;cursor:none}

#vis-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}

#magnetic-cursor{
  position:fixed;width:12px;height:12px;
  background:radial-gradient(circle,rgba(0,200,255,0.8),transparent);
  border-radius:50%;
  pointer-events:none;z-index:10000;
  transform:translate(-50%,-50%);
  box-shadow:0 0 30px rgba(0,200,255,0.3);
  transition:width 0.3s, height 0.3s;
}

#magnetic-cursor.attracted{
  width:24px;height:24px;
  box-shadow:0 0 50px rgba(0,200,255,0.6);
}

#data-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:50;pointer-events:none;
}

#data-sidebar{
  position:fixed;
  left:0;top:0;
  width:340px;height:100%;
  background:linear-gradient(to right,rgba(7,8,15,0.95),transparent);
  z-index:60;
  padding:40px 30px;
  display:flex;flex-direction:column;
  gap:20px;
  pointer-events:auto;
}

.data-header{
  font-family:'Outfit',sans-serif;
  font-size:1.5rem;
  font-weight:200;
  letter-spacing:3px;
  background:linear-gradient(90deg,#00c8ff,#a855f7);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.data-subtitle{
  font-size:0.65rem;
  letter-spacing:4px;
  color:rgba(0,200,255,0.4);
  text-transform:uppercase;
}

.data-card{
  background:rgba(0,200,255,0.03);
  border:1px solid rgba(0,200,255,0.08);
  border-radius:12px;
  padding:20px;
  transition:all 0.3s;
}

.data-card:hover{
  border-color:rgba(0,200,255,0.2);
  background:rgba(0,200,255,0.06);
}

.data-card .metric-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  letter-spacing:3px;
  color:rgba(0,200,255,0.5);
  text-transform:uppercase;
  margin-bottom:8px;
}

.data-card .metric-value{
  font-family:'JetBrains Mono',monospace;
  font-size:1.8rem;
  font-weight:700;
  color:#00c8ff;
  margin-bottom:5px;
}

.data-card .metric-change{
  font-size:0.7rem;
  color:rgba(0,255,136,0.6);
}

.data-card .metric-change.negative{color:rgba(255,80,80,0.6)}

.sparkline{
  display:flex;align-items:flex-end;gap:2px;
  height:30px;margin-top:10px;
}

.spark-bar{
  flex:1;
  background:linear-gradient(to top,rgba(0,200,255,0.3),rgba(0,200,255,0.05));
  border-radius:1px;
  transition:height 2s;
}

#dataset-selector{
  display:flex;flex-direction:column;gap:5px;
  margin-top:auto;
}

.dataset-btn{
  background:transparent;
  border:1px solid rgba(0,200,255,0.1);
  color:rgba(200,210,230,0.5);
  padding:10px 15px;
  font-family:'Outfit',sans-serif;
  font-size:0.75rem;
  letter-spacing:2px;
  cursor:pointer;
  border-radius:8px;
  transition:all 0.3s;
  text-align:left;
}

.dataset-btn:hover,.dataset-btn.active{
  border-color:rgba(0,200,255,0.3);
  color:#00c8ff;
  background:rgba(0,200,255,0.05);
}

#hover-tooltip{
  position:fixed;
  background:rgba(7,8,15,0.95);
  border:1px solid rgba(0,200,255,0.2);
  padding:12px 18px;
  border-radius:8px;
  pointer-events:none;
  z-index:200;
  opacity:0;
  transition:opacity 0.2s;
  backdrop-filter:blur(10px);
}

#hover-tooltip .tt-label{
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  color:rgba(0,200,255,0.5);
  letter-spacing:2px;
  margin-bottom:5px;
}

#hover-tooltip .tt-value{
  font-family:'JetBrains Mono',monospace;
  font-size:1.1rem;
  color:#00c8ff;
}

#sound-toggle{
  position:fixed;bottom:30px;right:30px;z-index:100;
  background:rgba(0,200,255,0.05);
  border:1px solid rgba(0,200,255,0.15);
  color:rgba(0,200,255,0.5);
  padding:8px 16px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.6rem;
  letter-spacing:2px;
  cursor:pointer;
  border-radius:6px;
  pointer-events:auto;
  transition:all 0.3s;
}

#stats-bar{
  position:fixed;
  bottom:30px;left:50%;transform:translateX(-50%);
  z-index:100;
  display:flex;gap:30px;
  pointer-events:none;
}

.stat-item{
  text-align:center;
}

.stat-item .stat-num{
  font-family:'JetBrains Mono',monospace;
  font-size:0.9rem;
  color:#00c8ff;
}

.stat-item .stat-label{
  font-size:0.55rem;
  color:rgba(0,200,255,0.3);
  letter-spacing:2px;
  text-transform:uppercase;
}

@media(max-width:768px){
  body{cursor:auto}
  #magnetic-cursor{display:none}
  #data-sidebar{
    width:100%;height:auto;
    position:fixed;bottom:0;top:auto;
    padding:15px;
    background:rgba(7,8,15,0.98);
    flex-direction:row;flex-wrap:wrap;
    max-height:40vh;overflow-y:auto;
    border-top:1px solid rgba(0,200,255,0.1);
  }
  .data-card{flex:1;min-width:140px}
  #dataset-selector{flex-direction:row;width:100%}
  .dataset-btn{flex:1;text-align:center}
  #stats-bar{display:none}
}
</style>
</head>
<body>

<div id="magnetic-cursor"></div>
<canvas id="vis-canvas"></canvas>

<div id="data-sidebar">
  <div>
    <div class="data-header">DATAVERSE</div>
    <div class="data-subtitle" style="margin-top:5px">Real-time Universe Analytics</div>
  </div>

  <div class="data-card">
    <div class="metric-label">Active Nodes</div>
    <div class="metric-value" id="metric-nodes">2,847</div>
    <div class="metric-change">↑ 12.4% from last cycle</div>
    <div class="sparkline" id="spark-1"></div>
  </div>

  <div class="data-card">
    <div class="metric-label">Data Throughput</div>
    <div class="metric-value" id="metric-throughput">1.2 PB/s</div>
    <div class="metric-change negative">↓ 3.1% flux variance</div>
    <div class="sparkline" id="spark-2"></div>
  </div>

  <div class="data-card">
    <div class="metric-label">Cluster Density</div>
    <div class="metric-value" id="metric-density">97.3%</div>
    <div class="metric-change">↑ optimal range</div>
    <div class="sparkline" id="spark-3"></div>
  </div>

  <div id="dataset-selector">
    <button class="dataset-btn active" data-set="galaxy">◆ Galaxy Clusters</button>
    <button class="dataset-btn" data-set="neural">◆ Neural Networks</button>
    <button class="dataset-btn" data-set="quantum">◆ Quantum States</button>
  </div>
</div>

<div id="hover-tooltip">
  <div class="tt-label">NODE DATA</div>
  <div class="tt-value" id="tt-val"></div>
</div>

<div id="stats-bar">
  <div class="stat-item">
    <div class="stat-num" id="fps-counter">60</div>
    <div class="stat-label">FPS</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="particle-count">0</div>
    <div class="stat-label">Particles</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="connection-count">0</div>
    <div class="stat-label">Connections</div>
  </div>
</div>

<button id="sound-toggle" onclick="toggleSound()">◊ Sound Off</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // --- Magnetic Attraction Cursor ---
  const cursorEl = document.getElementById('magnetic-cursor');
  let mx = 0, my = 0, cx = 0, cy = 0;
  let attractTargets = [];

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function updateCursor(){
    let targetX = mx, targetY = my;
    let attracted = false;

    // Check proximity to interactive elements
    document.querySelectorAll('.data-card,.dataset-btn').forEach(el => {
      const rect = el.getBoundingClientRect();
      const elCx = rect.left + rect.width/2;
      const elCy = rect.top + rect.height/2;
      const dist = Math.hypot(mx - elCx, my - elCy);
      if(dist < 100){
        const pull = 1 - dist/100;
        targetX += (elCx - mx) * pull * 0.3;
        targetY += (elCy - my) * pull * 0.3;
        attracted = true;
      }
    });

    cx += (targetX - cx) * 0.15;
    cy += (targetY - cy) * 0.15;
    cursorEl.style.left = cx + 'px';
    cursorEl.style.top = cy + 'px';
    cursorEl.classList.toggle('attracted', attracted);
  }

  // --- Sparklines ---
  function createSparkline(containerId, count = 20){
    const container = document.getElementById(containerId);
    for(let i = 0; i < count; i++){
      const bar = document.createElement('div');
      bar.className = 'spark-bar';
      bar.style.height = (Math.random() * 80 + 20) + '%';
      container.appendChild(bar);
    }
  }
  createSparkline('spark-1');
  createSparkline('spark-2');
  createSparkline('spark-3');

  // Animate sparklines
  setInterval(() => {
    document.querySelectorAll('.sparkline').forEach(s => {
      s.querySelectorAll('.spark-bar').forEach(b => {
        b.style.height = (Math.random() * 80 + 20) + '%';
      });
    });
    // Update metrics
    document.getElementById('metric-nodes').textContent = (2800 + Math.floor(Math.random()*100)).toLocaleString();
    document.getElementById('metric-throughput').textContent = (1.0 + Math.random()*0.4).toFixed(1) + ' PB/s';
    document.getElementById('metric-density').textContent = (95 + Math.random()*5).toFixed(1) + '%';
  }, 3000);

  // --- THREE.JS: 3D Data Visualization ---
  const canvas = document.getElementById('vis-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(80, 40, 80);
  camera.lookAt(0, 0, 0);

  // Data points as 3D scatter
  const dataPointCount = 800;
  const dataGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(dataPointCount * 3);
  const colors = new Float32Array(dataPointCount * 3);
  const sizes = new Float32Array(dataPointCount);
  const dataValues = [];

  let currentDataset = 'galaxy';

  function generateData(type){
    for(let i = 0; i < dataPointCount; i++){
      const i3 = i * 3;
      let x, y, z;
      const color = new THREE.Color();

      switch(type){
        case 'galaxy':
          const angle = Math.random() * Math.PI * 4;
          const radius = Math.random() * 50;
          x = Math.cos(angle) * radius + (Math.random()-0.5) * 10;
          y = (Math.random()-0.5) * 5 + Math.sin(angle * 2) * 3;
          z = Math.sin(angle) * radius + (Math.random()-0.5) * 10;
          color.setHSL(0.55 + radius/100 * 0.15, 0.8, 0.4 + Math.random()*0.3);
          break;
        case 'neural':
          x = (Math.random()-0.5) * 80;
          y = (Math.random()-0.5) * 80;
          z = (Math.random()-0.5) * 80;
          // Cluster around several centers
          const center = Math.floor(Math.random() * 5);
          const cx2 = [0,30,-30,15,-15][center];
          const cy2 = [0,-20,20,30,-25][center];
          const cz2 = [0,25,-25,-20,15][center];
          x = cx2 + (Math.random()-0.5) * 20;
          y = cy2 + (Math.random()-0.5) * 20;
          z = cz2 + (Math.random()-0.5) * 20;
          color.setHSL(0.3 + center * 0.05, 0.7, 0.4);
          break;
        case 'quantum':
          const phi = Math.random() * Math.PI * 2;
          const theta = Math.acos(Math.random() * 2 - 1);
          const r = 20 + Math.random() * 30;
          x = r * Math.sin(theta) * Math.cos(phi);
          y = r * Math.sin(theta) * Math.sin(phi);
          z = r * Math.cos(theta);
          color.setHSL(0.75 + Math.random()*0.1, 0.9, 0.5);
          break;
      }

      positions[i3] = x;
      positions[i3+1] = y;
      positions[i3+2] = z;
      colors[i3] = color.r;
      colors[i3+1] = color.g;
      colors[i3+2] = color.b;
      sizes[i] = 1 + Math.random() * 3;
      dataValues[i] = (Math.random() * 1000).toFixed(1);
    }

    dataGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    dataGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    dataGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    dataGeo.attributes.position.needsUpdate = true;
    dataGeo.attributes.color.needsUpdate = true;
  }

  generateData('galaxy');

  const dataMat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      void main(){
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main(){
        float d = length(gl_PointCoord - 0.5);
        if(d > 0.5) discard;
        float glow = exp(-d * 6.0);
        gl_FragColor = vec4(vColor, glow * 0.9);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true
  });

  const dataPoints = new THREE.Points(dataGeo, dataMat);
  scene.add(dataPoints);

  // Connection lines between nearby points
  function buildConnections(){
    // Remove old
    scene.children.filter(c => c.userData.isConnection).forEach(c => scene.remove(c));

    const linePositions = [];
    let connCount = 0;
    const maxConn = 500;
    const threshold = 15;

    for(let i = 0; i < dataPointCount && connCount < maxConn; i += 3){
      for(let j = i + 3; j < dataPointCount && connCount < maxConn; j += 3){
        const dx = positions[i*3] - positions[j*3];
        const dy = positions[i*3+1] - positions[j*3+1];
        const dz = positions[i*3+2] - positions[j*3+2];
        const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if(dist < threshold){
          linePositions.push(positions[i*3],positions[i*3+1],positions[i*3+2]);
          linePositions.push(positions[j*3],positions[j*3+1],positions[j*3+2]);
          connCount++;
        }
      }
    }

    if(linePositions.length > 0){
      const lineGeo = new THREE.BufferGeometry();
      lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
      const lineMat = new THREE.LineBasicMaterial({
        color: 0x00c8ff,
        transparent: true,
        opacity: 0.06,
        blending: THREE.AdditiveBlending
      });
      const lines = new THREE.LineSegments(lineGeo, lineMat);
      lines.userData.isConnection = true;
      scene.add(lines);
    }

    document.getElementById('connection-count').textContent = connCount;
  }
  buildConnections();

  // Grid floor
  const gridGeo = new THREE.PlaneGeometry(200, 200, 30, 30);
  const gridMat = new THREE.MeshBasicMaterial({
    color: 0x00c8ff,
    wireframe: true,
    transparent: true,
    opacity: 0.03
  });
  const grid = new THREE.Mesh(gridGeo, gridMat);
  grid.rotation.x = -Math.PI/2;
  grid.position.y = -50;
  scene.add(grid);

  // Dataset switching
  document.querySelectorAll('.dataset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.dataset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentDataset = btn.dataset.set;
      generateData(currentDataset);
      buildConnections();
      playDataSound();
    });
  });

  // Camera orbit
  let cameraAngle = 0;
  let autoRotate = true;
  let mouseInfluenceX = 0, mouseInfluenceY = 0;

  document.addEventListener('mousemove', e => {
    mouseInfluenceX = (e.clientX / window.innerWidth - 0.5) * 20;
    mouseInfluenceY = (e.clientY / window.innerHeight - 0.5) * 10;
  });

  // Tooltip via raycasting
  const raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 2;
  const mouse3D = new THREE.Vector2();
  const tooltip = document.getElementById('hover-tooltip');

  canvas.addEventListener('mousemove', e => {
    mouse3D.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse3D.y = -(e.clientY / window.innerHeight) * 2 + 1;
  });

  // Animation
  let time = 0;
  let frames = 0, lastFpsTime = performance.now();

  function animate(){
    requestAnimationFrame(animate);
    time += 0.003;
    frames++;

    const now = performance.now();
    if(now - lastFpsTime > 1000){
      document.getElementById('fps-counter').textContent = frames;
      frames = 0;
      lastFpsTime = now;
    }

    // Camera orbit
    if(autoRotate) cameraAngle += 0.002;
    camera.position.x = Math.cos(cameraAngle) * 100 + mouseInfluenceX;
    camera.position.z = Math.sin(cameraAngle) * 100;
    camera.position.y = 40 + mouseInfluenceY;
    camera.lookAt(0, 0, 0);

    // Subtle data point animation
    const pos = dataGeo.attributes.position.array;
    for(let i = 0; i < dataPointCount; i++){
      pos[i*3+1] += Math.sin(time * 2 + i * 0.1) * 0.01;
    }
    dataGeo.attributes.position.needsUpdate = true;

    document.getElementById('particle-count').textContent = dataPointCount;

    // Raycasting for tooltip
    raycaster.setFromCamera(mouse3D, camera);
    const intersects = raycaster.intersectObject(dataPoints);
    if(intersects.length > 0){
      const idx = intersects[0].index;
      tooltip.style.opacity = '1';
      tooltip.style.left = (mx + 20) + 'px';
      tooltip.style.top = (my - 20) + 'px';
      document.getElementById('tt-val').textContent = `${dataValues[idx]} units`;
    } else {
      tooltip.style.opacity = '0';
    }

    updateCursor();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- AUDIO: Sci-fi ambient data sounds ---
  let audioCtx, soundOn = false;

  function toggleSound(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    soundOn = !soundOn;
    document.getElementById('sound-toggle').textContent = soundOn ? '◊ Sound On' : '◊ Sound Off';
    if(soundOn) startDataAmbient();
  }

  function startDataAmbient(){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 82;
    gain.gain.value = 0.04;
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.08;
    lfoGain.gain.value = 5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
  }

  function playDataSound(){
    if(!soundOn || !audioCtx) return;
    const tones = { galaxy: [220, 330], neural: [440, 550], quantum: [660, 880] };
    const freqs = tones[currentDataset] || [220, 330];
    freqs.forEach((f, i) => {
      setTimeout(() => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = f;
        gain.gain.value = 0.06;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      }, i * 150);
    });
  }
})();
</script>
</body>
</html>
