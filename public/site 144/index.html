<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site 144 - Infinite Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cursor" id="custom-cursor">
        <span class="cursor-text">DRAG</span>
    </div>

    <nav class="navbar">
        <div class="logo">OBLIVION</div>
        <div class="info">GALLERY / 2026</div>
    </nav>

    <div class="progress-container">
        <div class="progress-bar" id="progress"></div>
    </div>

    <main class="gallery-wrapper">
        <div class="gallery" id="gallery">
            <!-- Items injected by JS for infinite effect -->
        </div>
    </main>

    <div class="title-overlay">
        <h1>Silent <br>Echoes</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
