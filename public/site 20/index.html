<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="NEON NEXUS - A game-like 3D world exploration experience">
<title>NEON NEXUS — World Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;cursor:none;font-family:'Rajdhani',sans-serif}

#game-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}

#crosshair{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  z-index:100;
  pointer-events:none;
}

#crosshair .ring{
  width:40px;height:40px;
  border:2px solid rgba(0,255,136,0.4);
  border-radius:50%;
  position:relative;
  transition:all 0.3s;
}

#crosshair .ring.locked{
  border-color:#0f0;
  box-shadow:0 0 20px rgba(0,255,136,0.5);
  transform:scale(0.8);
}

#crosshair .dot{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:4px;height:4px;
  background:#0f8;
  border-radius:50%;
}

#crosshair .line{
  position:absolute;
  background:rgba(0,255,136,0.3);
}
#crosshair .line.top{top:-8px;left:50%;transform:translateX(-50%);width:1px;height:6px}
#crosshair .line.bottom{bottom:-8px;left:50%;transform:translateX(-50%);width:1px;height:6px}
#crosshair .line.left{left:-8px;top:50%;transform:translateY(-50%);height:1px;width:6px}
#crosshair .line.right{right:-8px;top:50%;transform:translateY(-50%);height:1px;width:6px}

#hud{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:50;
  pointer-events:none;
}

#hud-top{
  position:absolute;top:20px;left:20px;right:20px;
  display:flex;justify-content:space-between;align-items:flex-start;
}

.hud-panel{
  background:rgba(0,20,10,0.6);
  border:1px solid rgba(0,255,136,0.15);
  padding:15px 20px;
  backdrop-filter:blur(10px);
}

.hud-label{
  font-family:'Orbitron',sans-serif;
  font-size:0.6rem;
  letter-spacing:3px;
  color:rgba(0,255,136,0.5);
  text-transform:uppercase;
  margin-bottom:5px;
}

.hud-value{
  font-family:'Orbitron',sans-serif;
  font-size:1.2rem;
  color:#0f8;
}

#compass{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;gap:2px;
  font-family:'Orbitron',sans-serif;
  font-size:0.6rem;
  color:rgba(0,255,136,0.3);
  letter-spacing:2px;
}

#compass .active{color:#0f8}

#info-panel{
  position:fixed;
  right:30px;
  top:50%;
  transform:translateY(-50%);
  max-width:350px;
  z-index:60;
  pointer-events:auto;
  opacity:0;
  transition:all 0.5s;
}

#info-panel.visible{opacity:1;transform:translateY(-50%) translateX(0)}

#info-panel .panel-inner{
  background:rgba(0,20,10,0.85);
  border:1px solid rgba(0,255,136,0.2);
  padding:30px;
  backdrop-filter:blur(20px);
}

#info-panel h3{
  font-family:'Orbitron',sans-serif;
  font-size:1.1rem;
  color:#0f8;
  margin-bottom:15px;
  letter-spacing:2px;
}

#info-panel p{
  color:rgba(200,255,220,0.7);
  font-size:0.95rem;
  line-height:1.7;
  margin-bottom:12px;
}

#info-panel .close-btn{
  background:transparent;
  border:1px solid rgba(0,255,136,0.3);
  color:#0f8;
  padding:8px 20px;
  font-family:'Orbitron',sans-serif;
  font-size:0.65rem;
  letter-spacing:3px;
  cursor:pointer;
  margin-top:10px;
  transition:all 0.3s;
}

#info-panel .close-btn:hover{
  background:rgba(0,255,136,0.1);
}

#controls-hint{
  position:fixed;
  bottom:30px;
  left:30px;
  z-index:60;
  font-family:'Rajdhani',sans-serif;
}

#controls-hint div{
  color:rgba(0,255,136,0.4);
  font-size:0.8rem;
  margin-bottom:5px;
}

#controls-hint span{
  display:inline-block;
  border:1px solid rgba(0,255,136,0.3);
  padding:2px 8px;
  font-size:0.7rem;
  margin-right:5px;
  color:rgba(0,255,136,0.6);
}

#sound-btn{
  position:fixed;
  bottom:30px;right:30px;
  z-index:60;
  background:rgba(0,20,10,0.6);
  border:1px solid rgba(0,255,136,0.2);
  color:#0f8;
  padding:8px 16px;
  font-family:'Orbitron',sans-serif;
  font-size:0.6rem;
  letter-spacing:2px;
  cursor:pointer;
  pointer-events:auto;
  transition:all 0.3s;
}

#loading-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#0a0a0a;z-index:9000;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity 1s;
}

#loading-screen.hidden{opacity:0;pointer-events:none}

#loading-screen h1{
  font-family:'Orbitron',sans-serif;
  font-size:2.5rem;
  color:#0f8;
  margin-bottom:30px;
  letter-spacing:5px;
}

#loading-bar{
  width:300px;height:2px;
  background:rgba(0,255,136,0.1);
  position:relative;
}

#loading-fill{
  height:100%;
  background:#0f8;
  width:0%;
  transition:width 0.3s;
  box-shadow:0 0 10px rgba(0,255,136,0.5);
}

#loading-screen .start-btn{
  margin-top:30px;
  background:transparent;
  border:1px solid rgba(0,255,136,0.3);
  color:#0f8;
  padding:12px 40px;
  font-family:'Orbitron',sans-serif;
  font-size:0.8rem;
  letter-spacing:5px;
  cursor:pointer;
  opacity:0;
  transition:all 0.5s;
}

#loading-screen .start-btn.ready{opacity:1}
#loading-screen .start-btn:hover{background:rgba(0,255,136,0.1)}

#minimap{
  position:fixed;
  bottom:80px;right:30px;
  width:120px;height:120px;
  z-index:60;
  background:rgba(0,20,10,0.6);
  border:1px solid rgba(0,255,136,0.15);
  pointer-events:none;
}

#minimap canvas{width:100%;height:100%}

@media(max-width:768px){
  body{cursor:auto}
  #crosshair{display:none}
  #controls-hint{display:none}
  #minimap{width:80px;height:80px;bottom:60px;right:15px}
  #info-panel{right:10px;left:10px;max-width:none}
  #hud-top{flex-wrap:wrap;gap:10px}
  .hud-panel{padding:10px 15px}
}
</style>
</head>
<body>

<div id="loading-screen">
  <h1>NEON NEXUS</h1>
  <p style="color:rgba(0,255,136,0.4);font-size:0.8rem;letter-spacing:5px;margin-bottom:30px">INITIALIZING WORLD</p>
  <div id="loading-bar"><div id="loading-fill"></div></div>
  <button class="start-btn" id="start-btn">ENTER WORLD</button>
</div>

<canvas id="game-canvas"></canvas>

<div id="crosshair">
  <div class="ring" id="crosshair-ring">
    <div class="dot"></div>
    <div class="line top"></div>
    <div class="line bottom"></div>
    <div class="line left"></div>
    <div class="line right"></div>
  </div>
</div>

<div id="hud">
  <div id="hud-top">
    <div class="hud-panel">
      <div class="hud-label">Location</div>
      <div class="hud-value" id="location-val">CENTRAL PLAZA</div>
    </div>
    <div class="hud-panel">
      <div class="hud-label">Discovered</div>
      <div class="hud-value" id="discovered-val">0 / 6</div>
    </div>
  </div>
</div>

<div id="compass">
  <span>N</span><span>·</span><span>·</span><span class="active">E</span><span>·</span><span>·</span><span>S</span><span>·</span><span>·</span><span>W</span>
</div>

<div id="info-panel">
  <div class="panel-inner">
    <h3 id="panel-title">NEXUS CORE</h3>
    <p id="panel-text">Information about this node will appear here.</p>
    <button class="close-btn" onclick="document.getElementById('info-panel').classList.remove('visible')">CLOSE [ESC]</button>
  </div>
</div>

<div id="controls-hint">
  <div><span>W</span><span>A</span><span>S</span><span>D</span> Move</div>
  <div><span>MOUSE</span> Look around</div>
  <div><span>CLICK</span> Interact with nodes</div>
</div>

<button id="sound-btn">SOUND: OFF</button>

<div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // Loading simulation
  const loadFill = document.getElementById('loading-fill');
  const startBtn = document.getElementById('start-btn');
  const loadingScreen = document.getElementById('loading-screen');
  let loadProgress = 0;

  const loadInterval = setInterval(() => {
    loadProgress += Math.random() * 15;
    if(loadProgress >= 100){
      loadProgress = 100;
      clearInterval(loadInterval);
      startBtn.classList.add('ready');
    }
    loadFill.style.width = loadProgress + '%';
  }, 200);

  let gameStarted = false;
  startBtn.addEventListener('click', () => {
    if(loadProgress < 100) return;
    loadingScreen.classList.add('hidden');
    gameStarted = true;
    canvas.requestPointerLock();
  });

  // Three.js setup
  const canvas = document.getElementById('game-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x050a05, 0.008);
  scene.background = new THREE.Color(0x050a05);

  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 500);
  camera.position.set(0, 5, 0);

  // Lighting
  const ambient = new THREE.AmbientLight(0x112211, 0.3);
  scene.add(ambient);

  const pointLight = new THREE.PointLight(0x00ff88, 2, 100);
  pointLight.position.set(0, 20, 0);
  pointLight.castShadow = true;
  scene.add(pointLight);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a0a,
    metalness: 0.8,
    roughness: 0.4,
    wireframe: false
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid lines on floor
  const gridHelper = new THREE.GridHelper(200, 40, 0x003300, 0x001100);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Interactive Nodes
  const nodes = [];
  const nodeData = [
    { pos: [0, 6, -30], color: 0x00ff88, title: 'NEXUS CORE', text: 'The central processing hub of the Neon Nexus. All data streams converge here, creating a neural network of information that powers the entire city. Built in 2156, it processes over 100 zettabytes per second.', location: 'NEXUS CORE' },
    { pos: [40, 8, -20], color: 0xff6600, title: 'DATA SPIRE', text: 'A monolithic data tower that reaches into the digital atmosphere. The Data Spire stores the collective consciousness of over 50 billion networked minds, each contributing to the shared knowledge matrix.', location: 'DATA SPIRE' },
    { pos: [-35, 5, -40], color: 0x6600ff, title: 'VOID GATE', text: 'The quantum portal connecting our reality to the digital substrate. No one knows who built the Void Gate, but it appeared simultaneously across all nexus cities exactly at midnight on January 1, 2200.', location: 'VOID GATE' },
    { pos: [20, 10, 30], color: 0xff0066, title: 'SYNTH GARDEN', text: 'A bio-digital ecosystem where organic life merges with synthetic constructs. The plants here photosynthesize data, converting raw information into breathable code — literally the air of the nexus.', location: 'SYNTH GARDEN' },
    { pos: [-50, 7, 15], color: 0x00ccff, title: 'ECHO CHAMBER', text: 'Every sound ever produced in the nexus is preserved here, layered into an infinite harmonic tapestry. Visitors report hearing whispered conversations from centuries past echoing through the crystalline walls.', location: 'ECHO CHAMBER' },
    { pos: [45, 12, 40], color: 0xffcc00, title: 'SOLAR FORGE', text: 'Harnessing microstar technology, the Solar Forge generates the raw energy that illuminates the eternal night of the nexus. Its fusion core burns at 15 million degrees, contained by quantum field emitters.', location: 'SOLAR FORGE' }
  ];

  const discovered = new Set();

  nodeData.forEach(nd => {
    const group = new THREE.Group();
    group.position.set(...nd.pos);

    // Core sphere
    const sphere = new THREE.Mesh(
      new THREE.IcosahedronGeometry(2, 1),
      new THREE.MeshStandardMaterial({
        color: nd.color,
        emissive: nd.color,
        emissiveIntensity: 0.5,
        metalness: 0.9,
        roughness: 0.1,
        wireframe: true
      })
    );
    group.add(sphere);

    // Outer ring
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(3.5, 0.1, 8, 32),
      new THREE.MeshBasicMaterial({ color: nd.color, transparent: true, opacity: 0.3 })
    );
    group.add(ring);

    // Light pillar
    const pillarGeo = new THREE.CylinderGeometry(0.05, 0.05, nd.pos[1], 4);
    const pillarMat = new THREE.MeshBasicMaterial({ color: nd.color, transparent: true, opacity: 0.2 });
    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
    pillar.position.y = -nd.pos[1] / 2;
    group.add(pillar);

    // Point light
    const light = new THREE.PointLight(nd.color, 1, 30);
    group.add(light);

    group.userData = nd;
    scene.add(group);
    nodes.push(group);
  });

  // Floating particles
  const particleCount = 2000;
  const pGeo = new THREE.BufferGeometry();
  const pPos = new Float32Array(particleCount * 3);
  for(let i = 0; i < particleCount; i++){
    pPos[i*3] = (Math.random()-0.5) * 200;
    pPos[i*3+1] = Math.random() * 30;
    pPos[i*3+2] = (Math.random()-0.5) * 200;
  }
  pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const pMat = new THREE.PointsMaterial({
    color: 0x00ff88,
    size: 0.1,
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending
  });
  const particles = new THREE.Points(pGeo, pMat);
  scene.add(particles);

  // Buildings
  for(let i = 0; i < 30; i++){
    const h = 5 + Math.random() * 30;
    const w = 2 + Math.random() * 5;
    const geo = new THREE.BoxGeometry(w, h, w);
    const mat = new THREE.MeshStandardMaterial({
      color: 0x0a0a0a,
      emissive: 0x001100,
      metalness: 0.9,
      roughness: 0.2
    });
    const bldg = new THREE.Mesh(geo, mat);
    bldg.position.set(
      (Math.random()-0.5) * 180,
      h/2,
      (Math.random()-0.5) * 180
    );
    bldg.castShadow = true;
    scene.add(bldg);

    // Window lights
    const windowCount = Math.floor(h / 3);
    for(let w2 = 0; w2 < windowCount; w2++){
      if(Math.random() > 0.5){
        const wLight = new THREE.Mesh(
          new THREE.PlaneGeometry(0.5, 0.3),
          new THREE.MeshBasicMaterial({
            color: Math.random() > 0.5 ? 0x00ff88 : 0x00ccff,
            transparent: true,
            opacity: 0.3 + Math.random() * 0.4
          })
        );
        wLight.position.set(w/2 + 0.01, -h/2 + w2 * 3 + 2, (Math.random()-0.5) * w * 0.8);
        bldg.add(wLight);
      }
    }
  }

  // Player movement
  const velocity = new THREE.Vector3();
  const direction = new THREE.Vector3();
  let yaw = 0, pitch = 0;
  const keys = {};

  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup', e => keys[e.code] = false);

  document.addEventListener('mousemove', e => {
    if(!gameStarted) return;
    if(document.pointerLockElement === canvas){
      yaw -= e.movementX * 0.002;
      pitch -= e.movementY * 0.002;
      pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
    }
  });

  canvas.addEventListener('click', () => {
    if(gameStarted && document.pointerLockElement !== canvas){
      canvas.requestPointerLock();
    }
  });

  document.addEventListener('keydown', e => {
    if(e.code === 'Escape'){
      document.getElementById('info-panel').classList.remove('visible');
    }
  });

  // Raycaster for interaction
  const raycaster = new THREE.Raycaster();
  const center = new THREE.Vector2(0, 0);

  canvas.addEventListener('click', () => {
    if(!gameStarted) return;
    raycaster.setFromCamera(center, camera);
    const intersects = raycaster.intersectObjects(nodes, true);
    if(intersects.length > 0){
      let target = intersects[0].object;
      while(target.parent && !target.userData.title) target = target.parent;
      if(target.userData.title){
        const data = target.userData;
        document.getElementById('panel-title').textContent = data.title;
        document.getElementById('panel-text').textContent = data.text;
        document.getElementById('info-panel').classList.add('visible');
        discovered.add(data.title);
        document.getElementById('discovered-val').textContent = `${discovered.size} / 6`;
        playUISound(800, 0.1);
      }
    }
  });

  // HUD updates
  function updateHUD(){
    // Find nearest node
    let nearest = null, nearDist = Infinity;
    nodes.forEach(n => {
      const d = camera.position.distanceTo(n.position);
      if(d < nearDist){ nearDist = d; nearest = n; }
    });
    if(nearest && nearDist < 50){
      document.getElementById('location-val').textContent = nearest.userData.location;
    } else {
      document.getElementById('location-val').textContent = 'OPEN SECTOR';
    }

    // Crosshair
    raycaster.setFromCamera(center, camera);
    const intersects = raycaster.intersectObjects(nodes, true);
    document.getElementById('crosshair-ring').classList.toggle('locked', intersects.length > 0);

    // Compass
    const compassEl = document.getElementById('compass');
    const angle = ((yaw % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
    const dirs = ['N','·','·','E','·','·','S','·','·','W'];
    const idx = Math.round(angle / (Math.PI*2) * 10) % 10;
    compassEl.querySelectorAll('span').forEach((s, i) => {
      s.classList.toggle('active', i === idx);
    });
  }

  // Minimap
  const minimapCanvas = document.getElementById('minimap-canvas');
  const mCtx = minimapCanvas.getContext('2d');

  function drawMinimap(){
    mCtx.clearRect(0, 0, 120, 120);
    mCtx.fillStyle = 'rgba(0,20,10,0.8)';
    mCtx.fillRect(0, 0, 120, 120);

    // Player
    const px = 60 + camera.position.x * 0.5;
    const py = 60 + camera.position.z * 0.5;
    mCtx.fillStyle = '#0f8';
    mCtx.beginPath();
    mCtx.arc(60, 60, 3, 0, Math.PI * 2);
    mCtx.fill();

    // Direction
    mCtx.strokeStyle = '#0f8';
    mCtx.lineWidth = 1;
    mCtx.beginPath();
    mCtx.moveTo(60, 60);
    mCtx.lineTo(60 + Math.sin(yaw) * 10, 60 - Math.cos(yaw) * 10);
    mCtx.stroke();

    // Nodes
    nodes.forEach(n => {
      const nx = 60 + (n.position.x - camera.position.x) * 0.5;
      const ny = 60 + (n.position.z - camera.position.z) * 0.5;
      if(nx > 0 && nx < 120 && ny > 0 && ny < 120){
        mCtx.fillStyle = '#' + n.userData.color.toString(16).padStart(6, '0');
        mCtx.beginPath();
        mCtx.arc(nx, ny, 3, 0, Math.PI * 2);
        mCtx.fill();
      }
    });
  }

  // Audio
  let audioCtx, soundOn = false;

  document.getElementById('sound-btn').addEventListener('click', () => {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    soundOn = !soundOn;
    document.getElementById('sound-btn').textContent = `SOUND: ${soundOn ? 'ON' : 'OFF'}`;
  });

  function playUISound(freq, dur){
    if(!soundOn || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.value = 0.05;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }

  function playAmbient(){
    if(!soundOn || !audioCtx) return;
    // Mechanical hum
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 40;
    gain.gain.value = 0.02;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    return { osc, gain };
  }

  let ambientSound = null;

  // Animation
  let time = 0;
  const clock = new THREE.Clock();

  function animate(){
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    time += delta;

    if(gameStarted){
      // Camera rotation
      const euler = new THREE.Euler(pitch, yaw, 0, 'YXZ');
      camera.quaternion.setFromEuler(euler);

      // Movement
      direction.set(0, 0, 0);
      if(keys['KeyW']) direction.z -= 1;
      if(keys['KeyS']) direction.z += 1;
      if(keys['KeyA']) direction.x -= 1;
      if(keys['KeyD']) direction.x += 1;
      direction.normalize();
      direction.applyQuaternion(camera.quaternion);
      direction.y = 0;

      const speed = 25;
      camera.position.add(direction.multiplyScalar(speed * delta));
      camera.position.y = 5;

      // Clamp position
      camera.position.x = Math.max(-90, Math.min(90, camera.position.x));
      camera.position.z = Math.max(-90, Math.min(90, camera.position.z));

      // Animate nodes
      nodes.forEach((n, i) => {
        n.children[0].rotation.y = time * 0.5 + i;
        n.children[0].rotation.x = Math.sin(time + i) * 0.3;
        n.children[1].rotation.x = Math.PI/2;
        n.children[1].rotation.z = time * 0.3 + i;
        n.position.y = n.userData.pos[1] + Math.sin(time * 0.5 + i * 2) * 1;
      });

      // Animate particles
      const pPositions = particles.geometry.attributes.position.array;
      for(let i = 0; i < particleCount; i++){
        pPositions[i*3+1] += delta * 0.5;
        if(pPositions[i*3+1] > 30) pPositions[i*3+1] = 0;
      }
      particles.geometry.attributes.position.needsUpdate = true;

      updateHUD();
      drawMinimap();

      // Sound start
      if(soundOn && !ambientSound){
        ambientSound = playAmbient();
      }
      if(!soundOn && ambientSound){
        ambientSound.gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
        setTimeout(() => { try{ambientSound.osc.stop();}catch(e){} ambientSound = null; }, 600);
      }
    }

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
