<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="GLITCH COSMOS - An experimental chaotic interface of controlled creative disorder">
<title>GLITCH COSMOS — Controlled Chaos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  color:#fff;
  overflow:hidden;
  cursor:none;
  font-family:'VT323',monospace;
}

#chaos-canvas{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:1;
}

/* Glitch cursor */
#glitch-cursor{
  position:fixed;
  width:20px;height:20px;
  pointer-events:none;
  z-index:10000;
  mix-blend-mode:difference;
}

#glitch-cursor .c1{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:2px solid #f00;
  transform:translate(-50%,-50%);
}

#glitch-cursor .c2{
  position:absolute;top:2px;left:2px;
  width:100%;height:100%;
  border:2px solid #0ff;
  transform:translate(-50%,-50%);
}

#glitch-cursor .c3{
  position:absolute;top:-2px;left:-1px;
  width:100%;height:100%;
  border:2px solid #0f0;
  transform:translate(-50%,-50%);
}

/* Floating fragments */
.chaos-fragment{
  position:fixed;
  z-index:50;
  pointer-events:auto;
  cursor:pointer;
  transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  animation:float 6s ease-in-out infinite;
  user-select:none;
}

.chaos-fragment:hover{
  transform:scale(1.1) rotate(5deg)!important;
  z-index:200;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

.frag-text{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  padding:20px 25px;
  max-width:280px;
  backdrop-filter:blur(5px);
}

.frag-text h3{
  font-family:'Silkscreen',sans-serif;
  font-size:0.8rem;
  margin-bottom:10px;
  letter-spacing:2px;
}

.frag-text p{
  font-family:'VT323',monospace;
  font-size:1rem;
  line-height:1.5;
  color:rgba(255,255,255,0.6);
}

.frag-image{
  width:200px;height:200px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
}

.frag-image canvas{width:100%;height:100%}

.frag-code{
  background:rgba(0,255,0,0.03);
  border:1px solid rgba(0,255,0,0.15);
  padding:15px 20px;
  font-family:'Press Start 2P',monospace;
  font-size:0.5rem;
  line-height:2;
  color:rgba(0,255,0,0.6);
  max-width:250px;
}

.frag-glitch{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(1rem,5vw,3rem);
  color:#fff;
  text-shadow:2px 0 #f00,-2px 0 #0ff;
  animation:textGlitch 3s infinite;
}

@keyframes textGlitch{
  0%,100%{text-shadow:2px 0 #f00,-2px 0 #0ff}
  20%{text-shadow:-2px 0 #f00,2px 0 #0ff}
  40%{text-shadow:0 2px #f00,0 -2px #0ff}
  60%{text-shadow:3px -1px #f00,-3px 1px #0ff}
  80%{text-shadow:-1px 2px #f00,1px -2px #0ff}
}

/* Scanlines */
#scanlines{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:60;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.1) 0px,
    rgba(0,0,0,0.1) 1px,
    transparent 1px,
    transparent 3px
  );
  opacity:0.3;
}

/* Glitch lines */
.glitch-h-line{
  position:fixed;
  width:100%;
  height:2px;
  z-index:55;
  pointer-events:none;
  mix-blend-mode:screen;
}

/* Random data streams */
#data-rain{
  position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:45;
  pointer-events:none;
  opacity:0.15;
  font-family:'Press Start 2P',monospace;
  font-size:0.5rem;
  overflow:hidden;
}

.data-column{
  position:absolute;
  top:0;
  writing-mode:vertical-rl;
  color:#0f0;
  animation:dataFall linear infinite;
  opacity:0.3;
}

@keyframes dataFall{
  0%{transform:translateY(-100%)}
  100%{transform:translateY(100vh)}
}

/* Control chaos */
#chaos-controls{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:500;
  display:flex;
  gap:5px;
  pointer-events:auto;
}

.chaos-btn{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);
  padding:10px 20px;
  font-family:'VT323',monospace;
  font-size:1rem;
  letter-spacing:2px;
  cursor:pointer;
  transition:all 0.3s;
}

.chaos-btn:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.3);
  color:#fff;
  text-shadow:0 0 10px rgba(255,255,255,0.5);
}

.chaos-btn.active{
  border-color:#0ff;
  color:#0ff;
}

#entropy-meter{
  position:fixed;
  top:30px;
  left:50%;
  transform:translateX(-50%);
  z-index:500;
  text-align:center;
}

#entropy-label{
  font-family:'Silkscreen',sans-serif;
  font-size:0.6rem;
  letter-spacing:5px;
  color:rgba(255,255,255,0.2);
  margin-bottom:8px;
}

#entropy-bar{
  width:300px;height:3px;
  background:rgba(255,255,255,0.05);
  border-radius:2px;
  overflow:hidden;
}

#entropy-fill{
  height:100%;
  background:linear-gradient(90deg,#0ff,#f0f,#ff0,#f00);
  width:50%;
  transition:width 0.5s;
}

#sound-toggle{
  position:fixed;
  top:30px;right:30px;
  z-index:500;
  background:transparent;
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.3);
  padding:8px 16px;
  font-family:'VT323',monospace;
  font-size:0.9rem;
  cursor:pointer;
  pointer-events:auto;
  transition:all 0.3s;
}

#version-tag{
  position:fixed;
  top:30px;left:30px;
  z-index:500;
  font-family:'Press Start 2P',monospace;
  font-size:0.5rem;
  color:rgba(255,255,255,0.15);
  letter-spacing:2px;
}

/* Draggable hint */
.drag-hint{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  z-index:500;
  font-size:0.8rem;
  color:rgba(255,255,255,0.15);
  letter-spacing:3px;
  animation:blink 2s infinite;
}

@keyframes blink{0%,100%{opacity:0.15}50%{opacity:0.5}}

@media(max-width:768px){
  body{cursor:auto;overflow:auto}
  #glitch-cursor{display:none}
  .chaos-fragment{position:relative!important;margin:10px auto!important}
  #chaos-controls{flex-wrap:wrap;justify-content:center;bottom:10px}
  .chaos-btn{padding:8px 14px;font-size:0.8rem}
  #entropy-bar{width:200px}
  .frag-glitch{font-size:1rem!important}
  #data-rain{display:none}
}
</style>
</head>
<body>

<div id="glitch-cursor">
  <div class="c1"></div>
  <div class="c2"></div>
  <div class="c3"></div>
</div>

<canvas id="chaos-canvas"></canvas>
<div id="scanlines"></div>

<div id="data-rain"></div>

<div id="version-tag">GLITCH_COSMOS v0.██</div>

<div id="entropy-meter">
  <div id="entropy-label">ENTROPY LEVEL</div>
  <div id="entropy-bar"><div id="entropy-fill"></div></div>
</div>

<button id="sound-toggle" onclick="toggleSound()">SND:OFF</button>

<!-- Chaotic content fragments scattered across screen -->
<div id="fragments-container"></div>

<div class="drag-hint">[ DRAG FRAGMENTS • CLICK TO GLITCH • CHAOS IS CONTENT ]</div>

<div id="chaos-controls">
  <button class="chaos-btn" onclick="shuffleAll()">SHUFFLE</button>
  <button class="chaos-btn" onclick="implode()">IMPLODE</button>
  <button class="chaos-btn" onclick="explode()">EXPLODE</button>
  <button class="chaos-btn" onclick="glitchAll()">GLITCH</button>
  <button class="chaos-btn" onclick="addFragment()">+ ADD</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // --- GLITCH CURSOR with RGB split ---
  const gc = document.getElementById('glitch-cursor');
  let gmx = 0, gmy = 0;

  document.addEventListener('mousemove', e => {
    gmx = e.clientX; gmy = e.clientY;
    gc.style.left = gmx + 'px';
    gc.style.top = gmy + 'px';

    // Random glitch offset
    if(Math.random() > 0.9){
      const off = (Math.random()-0.5) * 6;
      gc.querySelector('.c1').style.transform = `translate(calc(-50% + ${off}px), calc(-50% + ${-off}px))`;
      gc.querySelector('.c2').style.transform = `translate(calc(-50% + ${-off}px), calc(-50% + ${off}px))`;
    }
  });

  // --- DATA RAIN ---
  const dataRain = document.getElementById('data-rain');
  const chars = '01アイウエオカキクケコ∞∑∫ΔΩΨΦ';

  for(let i = 0; i < 15; i++){
    const col = document.createElement('div');
    col.className = 'data-column';
    col.style.left = (Math.random() * 100) + '%';
    col.style.animationDuration = (5 + Math.random() * 15) + 's';
    col.style.animationDelay = (-Math.random() * 10) + 's';

    let text = '';
    for(let j = 0; j < 50; j++){
      text += chars[Math.floor(Math.random()*chars.length)] + '\n';
    }
    col.textContent = text;
    col.style.color = ['#0f0','#0ff','#f0f','#ff0'][Math.floor(Math.random()*4)];
    dataRain.appendChild(col);
  }

  // --- CHAOTIC FRAGMENTS ---
  const fragmentsContainer = document.getElementById('fragments-container');
  const fragmentData = [
    { type:'glitch', content:'REALITY IS A BUG' },
    { type:'text', title:'ERROR #4071', text:'The system encountered an unexpected moment of beauty. Debugging consciousness... Stack overflow in emotion buffer.' },
    { type:'code', content:'function reality(){\n  while(true){\n    create();\n    destroy();\n    repeat();\n  }\n  // unreachable\n  return meaning;\n}' },
    { type:'text', title:'SIGNAL FOUND', text:'Between the noise and the silence, between the ones and the zeros, something breathes. Something watches. Something waits.' },
    { type:'glitch', content:'CTRL+Z UNIVERSE' },
    { type:'code', content:'const chaos = {\n  order: undefined,\n  entropy: Infinity,\n  beauty: true,\n  meaning: NaN\n};' },
    { type:'text', title:'TRANSMISSION', text:'We are the glitch in the matrix that became self-aware. The error that learned to love its own imperfection.' },
    { type:'image' },
    { type:'glitch', content:'404: NORMAL NOT FOUND' },
    { type:'text', title:'FRAGMENT_09', text:'Every pixel is a universe. Every frame is a lifetime. Every crash is a rebirth. Welcome to the chaos that creates.' },
    { type:'code', content:'try {\n  existence.parse();\n} catch(e) {\n  // This is where\n  // art happens\n  console.log("✦");\n}'},
    { type:'image' }
  ];

  let entropy = 50;
  const fragments = [];

  function createFragment(data, x, y){
    const frag = document.createElement('div');
    frag.className = 'chaos-fragment';
    frag.style.left = (x || Math.random() * (window.innerWidth - 300)) + 'px';
    frag.style.top = (y || Math.random() * (window.innerHeight - 250)) + 'px';
    frag.style.animationDelay = (-Math.random() * 6) + 's';

    switch(data.type){
      case 'text':
        frag.innerHTML = `<div class="frag-text"><h3>${data.title}</h3><p>${data.text}</p></div>`;
        break;
      case 'code':
        frag.innerHTML = `<div class="frag-code">${data.content}</div>`;
        break;
      case 'glitch':
        frag.innerHTML = `<div class="frag-glitch">${data.content}</div>`;
        break;
      case 'image':
        const c = document.createElement('canvas');
        c.width = 200; c.height = 200;
        const imgDiv = document.createElement('div');
        imgDiv.className = 'frag-image';
        imgDiv.appendChild(c);
        frag.appendChild(imgDiv);
        drawGlitchArt(c);
        break;
    }

    // Click to glitch
    frag.addEventListener('click', () => {
      frag.style.transform = `scale(${0.8+Math.random()*0.4}) rotate(${(Math.random()-0.5)*30}deg)`;
      frag.style.filter = `hue-rotate(${Math.random()*360}deg)`;
      setTimeout(() => {
        frag.style.filter = '';
      }, 500);
      entropy = Math.min(100, entropy + 5);
      updateEntropy();
      playGlitchSound();
    });

    // Draggable
    let dragging = false, offX, offY;
    frag.addEventListener('mousedown', e => {
      dragging = true;
      offX = e.clientX - frag.offsetLeft;
      offY = e.clientY - frag.offsetTop;
      frag.style.zIndex = 200;
      frag.style.animation = 'none';
    });

    document.addEventListener('mousemove', e => {
      if(!dragging) return;
      frag.style.left = (e.clientX - offX) + 'px';
      frag.style.top = (e.clientY - offY) + 'px';
    });

    document.addEventListener('mouseup', () => {
      if(dragging){
        dragging = false;
        frag.style.zIndex = 50;
      }
    });

    fragmentsContainer.appendChild(frag);
    fragments.push(frag);
    return frag;
  }

  fragmentData.forEach(d => createFragment(d));

  function drawGlitchArt(canvas){
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, 200, 200);

    // Glitch bands
    for(let i = 0; i < 40; i++){
      const y = Math.random() * 200;
      const h = 1 + Math.random() * 8;
      ctx.fillStyle = `hsla(${Math.random()*360},80%,50%,${Math.random()*0.5})`;
      ctx.fillRect(Math.random()*50, y, 200 - Math.random()*50, h);
    }

    // Noise
    const imageData = ctx.getImageData(0, 0, 200, 200);
    for(let i = 0; i < imageData.data.length; i += 4){
      if(Math.random() > 0.95){
        imageData.data[i] = Math.random() * 255;
        imageData.data[i+1] = Math.random() * 255;
        imageData.data[i+2] = Math.random() * 255;
      }
    }
    ctx.putImageData(imageData, 0, 0);
  }

  // --- CHAOS CONTROLS ---
  function shuffleAll(){
    fragments.forEach(f => {
      f.style.left = Math.random() * (window.innerWidth - 300) + 'px';
      f.style.top = Math.random() * (window.innerHeight - 250) + 'px';
      f.style.transform = `rotate(${(Math.random()-0.5)*20}deg)`;
    });
    entropy = Math.min(100, entropy + 15);
    updateEntropy();
    playGlitchSound();
  }

  function implode(){
    const cx = window.innerWidth / 2 - 100;
    const cy = window.innerHeight / 2 - 100;
    fragments.forEach((f, i) => {
      f.style.left = (cx + (Math.random()-0.5)*100) + 'px';
      f.style.top = (cy + (Math.random()-0.5)*100) + 'px';
      f.style.transform = `scale(0.5) rotate(${i*30}deg)`;
    });
    entropy = Math.max(0, entropy - 20);
    updateEntropy();
    playGlitchSound();
  }

  function explode(){
    fragments.forEach(f => {
      const angle = Math.random() * Math.PI * 2;
      const dist = 200 + Math.random() * 500;
      f.style.left = (window.innerWidth/2 + Math.cos(angle)*dist - 100) + 'px';
      f.style.top = (window.innerHeight/2 + Math.sin(angle)*dist - 100) + 'px';
      f.style.transform = `rotate(${(Math.random()-0.5)*90}deg)`;
    });
    entropy = Math.min(100, entropy + 25);
    updateEntropy();
    playGlitchSound();
  }

  function glitchAll(){
    fragments.forEach(f => {
      f.style.filter = `hue-rotate(${Math.random()*360}deg) saturate(${1+Math.random()*3})`;
      f.style.transform = `skew(${(Math.random()-0.5)*20}deg, ${(Math.random()-0.5)*10}deg)`;
      setTimeout(() => {
        f.style.filter = '';
        f.style.transform = '';
      }, 1000 + Math.random()*2000);
    });
    entropy = Math.min(100, entropy + 10);
    updateEntropy();
    playGlitchSound();

    // Screen flash
    document.body.style.filter = 'invert(1)';
    setTimeout(() => document.body.style.filter = '', 50);
  }

  function addFragment(){
    const types = ['text', 'code', 'glitch'];
    const type = types[Math.floor(Math.random()*types.length)];
    let data;
    if(type === 'text') data = { type, title: 'NEW_FRAG', text: 'Born from chaos at epoch ' + Date.now() % 10000 };
    else if(type === 'code') data = { type, content: `// fragment_${fragments.length}\nconst chaos = ${Math.random().toFixed(6)};` };
    else data = { type, content: ['BREAK THE GRID', 'ENTROPY RISING', 'GLITCH PROTOCOL', 'VOID.EXE'][Math.floor(Math.random()*4)] };
    createFragment(data, gmx - 50, gmy - 50);
    entropy = Math.min(100, entropy + 5);
    updateEntropy();
  }

  window.shuffleAll = shuffleAll;
  window.implode = implode;
  window.explode = explode;
  window.glitchAll = glitchAll;
  window.addFragment = addFragment;

  function updateEntropy(){
    document.getElementById('entropy-fill').style.width = entropy + '%';
    // Change scanline intensity
    document.getElementById('scanlines').style.opacity = 0.1 + entropy * 0.005;
  }

  // Random glitch lines
  function spawnGlitchLine(){
    const line = document.createElement('div');
    line.className = 'glitch-h-line';
    line.style.top = Math.random() * 100 + '%';
    line.style.height = (1 + Math.random() * 4) + 'px';
    line.style.background = ['#f00','#0ff','#0f0','#f0f'][Math.floor(Math.random()*4)];
    line.style.opacity = Math.random() * 0.5;
    document.body.appendChild(line);
    setTimeout(() => line.remove(), 50 + Math.random()*150);
  }

  setInterval(() => {
    if(Math.random() < entropy/100) spawnGlitchLine();
  }, 100);

  // --- THREE.JS: Chaotic 3D background ---
  const canvas = document.getElementById('chaos-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(1); // Intentionally low for glitch aesthetic

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.z = 50;

  // Chaotic geometry
  const chaosGroup = new THREE.Group();
  scene.add(chaosGroup);

  const geos = [
    new THREE.TetrahedronGeometry(3, 0),
    new THREE.OctahedronGeometry(2, 0),
    new THREE.BoxGeometry(4, 4, 4),
    new THREE.ConeGeometry(2, 4, 4),
    new THREE.TorusKnotGeometry(2, 0.5, 32, 4)
  ];

  for(let i = 0; i < 30; i++){
    const geo = geos[Math.floor(Math.random()*geos.length)];
    const hue = Math.random();
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(hue, 0.8, 0.3),
      wireframe: true,
      transparent: true,
      opacity: 0.1 + Math.random() * 0.15
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random()-0.5) * 80,
      (Math.random()-0.5) * 80,
      (Math.random()-0.5) * 80
    );
    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    mesh.userData = {
      basePos: mesh.position.clone(),
      rotSpeed: new THREE.Vector3((Math.random()-0.5)*0.03, (Math.random()-0.5)*0.03, (Math.random()-0.5)*0.03),
      chaos: Math.random()
    };
    chaosGroup.add(mesh);
  }

  let time = 0;

  function animate(){
    requestAnimationFrame(animate);
    time += 0.01;

    chaosGroup.children.forEach(m => {
      m.rotation.x += m.userData.rotSpeed.x;
      m.rotation.y += m.userData.rotSpeed.y;
      m.rotation.z += m.userData.rotSpeed.z;

      // Chaos displacement
      const chaos = entropy / 100;
      m.position.x = m.userData.basePos.x + Math.sin(time + m.userData.chaos * 10) * chaos * 10;
      m.position.y = m.userData.basePos.y + Math.cos(time * 0.7 + m.userData.chaos * 8) * chaos * 10;

      // Color shifts
      if(Math.random() < chaos * 0.01){
        m.material.color.setHSL(Math.random(), 0.8, 0.3);
      }
    });

    camera.rotation.z = Math.sin(time * 0.3) * 0.05 * (entropy/100);
    camera.position.x = Math.sin(time * 0.2) * 5;

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- AUDIO: Chaotic glitch sounds ---
  let audioCtx, soundOn = false;

  function toggleSound(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    soundOn = !soundOn;
    document.getElementById('sound-toggle').textContent = soundOn ? 'SND:ON' : 'SND:OFF';
    if(soundOn) startChaosAmbient();
  }
  window.toggleSound = toggleSound;

  function startChaosAmbient(){
    // Low rumble
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 30;
    gain.gain.value = 0.02;
    osc.connect(gain);

    // Bit crusher effect simulation
    const dist = audioCtx.createWaveShaper();
    const curve = new Float32Array(256);
    for(let i = 0; i < 256; i++){
      const x = (i / 128) - 1;
      curve[i] = Math.sign(x) * Math.pow(Math.abs(x), 0.5);
    }
    dist.curve = curve;
    gain.connect(dist);
    dist.connect(audioCtx.destination);
    osc.start();
  }

  function playGlitchSound(){
    if(!soundOn || !audioCtx) return;
    // Random noise burst
    const bufferSize = audioCtx.sampleRate * 0.05;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i = 0; i < bufferSize; i++){
      data[i] = (Math.random() * 2 - 1) * 0.3;
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.1;
    source.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();

    // Glitch tone
    const osc = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc.type = ['square','sawtooth'][Math.floor(Math.random()*2)];
    osc.frequency.value = 100 + Math.random() * 2000;
    g2.gain.value = 0.04;
    g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(g2);
    g2.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
  }

  // Entropy natural decay
  setInterval(() => {
    entropy = Math.max(10, entropy - 1);
    updateEntropy();
  }, 2000);
})();
</script>
