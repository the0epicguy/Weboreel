<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Gender Recognition | AI Analysis</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent-male: #4a90e2;
            --accent-female: #e91e63;
            --text-main: #ffffff;
            --text-muted: #a0a5b5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b2744 0%, #0b0f19 100%);
        }

        /* Ambient Background Glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 172, 254, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse-glow 8s infinite alternate ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.4; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .visualizer-container {
            width: 100%;
            height: 120px;
            margin: 2rem 0;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .mic-btn-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .mic-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .mic-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.4);
        }

        .mic-btn:active {
            transform: translateY(1px) scale(0.95);
        }

        .mic-btn.recording {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            animation: pulse-red 2s infinite;
            box-shadow: 0 10px 20px rgba(255, 65, 108, 0.4);
        }

        .mic-btn.recording svg {
            transform: scale(1.1);
        }

        .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 242, 254, 0.4);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .mic-btn-wrapper.recording .ripple {
            background: rgba(255, 65, 108, 0.4);
            animation: ripple-effect 1.5s linear infinite;
        }

        @keyframes ripple-effect {
            0% { width: 80px; height: 80px; opacity: 0.8; }
            100% { width: 200px; height: 200px; opacity: 0; }
        }
        
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 65, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0); }
        }

        .status-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            min-height: 24px;
            margin-bottom: 1.5rem;
            transition: color 0.3s;
        }

        .result-panel {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fade-up 0.5s ease forwards;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            text-transform: capitalize;
        }

        .result-value.male { color: var(--accent-male); }
        .result-value.female { color: var(--accent-female); }

        .hz-display {
            font-family: monospace;
            font-size: 1.1rem;
            color: #8892b0;
            background: rgba(0,0,0,0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.1s linear;
        }

    </style>
    <!-- Import Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="container">
        <header>
            <h1>Voice AI Analysis</h1>
            <p class="subtitle">Advanced pitch tracking to determine perceived vocal gender.</p>
        </header>

        <div class="visualizer-container">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="mic-btn-wrapper" id="micWrapper">
            <div class="ripple"></div>
            <button class="mic-btn" id="recordBtn" aria-label="Start Recording">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
        </div>

        <div class="status-text" id="statusText">Tap microphone to scan voice</div>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="result-label">Detected Identity</div>
            <div class="result-value" id="genderResult">--</div>
            <div class="hz-display">Pitch: <span id="pitchValue">--</span> Hz</div>
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const micWrapper = document.getElementById('micWrapper');
        const statusText = document.getElementById('statusText');
        const resultPanel = document.getElementById('resultPanel');
        const genderResult = document.getElementById('genderResult');
        const pitchValue = document.getElementById('pitchValue');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        let audioCtx;
        let analyser;
        let source;
        let recordingInterval;
        let animationId;
        
        const RECORDING_TIME = 4000; // 4 seconds of analysis
        const MIN_SAMPLES = 10;
        
        let pitchSamples = [];
        let isRecording = false;

        // Resize Canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Yin algorithm or simple Autocorrelation for Pitch Detection
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let MAX_SAMPLES = Math.floor(SIZE/2);
            let best_offset = -1;
            let best_correlation = 0;
            let rms = 0;
            let foundGoodCorrelation = false;
            let correlations = new Array(MAX_SAMPLES);

            for (let i = 0; i < SIZE; i++) {
                let val = buf[i];
                rms += val * val;
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) // Not enough signal
                return -1;

            let lastCorrelation = 1;
            for (let offset = 0; offset < MAX_SAMPLES; offset++) {
                let correlation = 0;

                for (let i = 0; i < MAX_SAMPLES; i++) {
                    correlation += Math.abs((buf[i]) - (buf[i + offset]));
                }
                correlation = 1 - (correlation / MAX_SAMPLES);
                correlations[offset] = correlation;
                
                if ((correlation > 0.9) && (correlation > lastCorrelation)) {
                    foundGoodCorrelation = true;
                    if (correlation > best_correlation) {
                        best_correlation = correlation;
                        best_offset = offset;
                    }
                } else if (foundGoodCorrelation) {
                    let shift = (correlations[best_offset + 1] - correlations[best_offset - 1]) / correlations[best_offset];  
                    return sampleRate / (best_offset + (8 * shift));
                }
                lastCorrelation = correlation;
            }
            if (best_correlation > 0.01) {
                return sampleRate / best_offset;
            }
            return -1;
        }

        function drawVisualizer(dataArray, bufferLength) {
            animationId = requestAnimationFrame(() => drawVisualizer(dataArray, bufferLength));
            
            analyser.getByteTimeDomainData(dataArray);
            
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            
            canvasCtx.lineWidth = 3;
            if(isRecording) {
                canvasCtx.strokeStyle = 'url(#gradientRecording)';
                // Fallback gradient for canvas
                let gradient = canvasCtx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, "#ff416c");
                gradient.addColorStop(1, "#ff4b2b");
                canvasCtx.strokeStyle = gradient;
            } else {
                let gradient = canvasCtx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, "#00f2fe");
                gradient.addColorStop(1, "#4facfe");
                canvasCtx.strokeStyle = gradient;
            }
            
            canvasCtx.beginPath();
            
            let sliceWidth = canvas.width * 1.0 / bufferLength;
            let x = 0;
            
            for(let i = 0; i < bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                
                if(i === 0) {
                    canvasCtx.moveTo(x, y);
                } else {
                    canvasCtx.lineTo(x, y);
                }
                x += sliceWidth;
            }
            
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }

        function startPitchDetection() {
            const buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            let pitch = autoCorrelate(buf, audioCtx.sampleRate);
            
            if (pitch !== -1 && pitch > 50 && pitch < 500) {
                pitchSamples.push(pitch);
            }
        }

        function determineGender(averagePitch) {
            // General speaking fundamental frequency ranges:
            // Male: 85 - 180 Hz
            // Female: 165 - 255 Hz
            // This is a heuristic model

            if (averagePitch < 165) {
                return { text: 'Male', class: 'male' };
            } else {
                return { text: 'Female', class: 'female' };
            }
        }

        async function startAnalysis() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                // Initialize Audio Context
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                
                const bufferLength = analyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                
                // UI Updates
                isRecording = true;
                recordBtn.classList.add('recording');
                micWrapper.classList.add('recording');
                statusText.innerText = 'Analyzing voice, please speak continuously...';
                resultPanel.style.display = 'none';
                progressBar.style.display = 'block';
                pitchSamples = [];
                
                // Visualizer
                drawVisualizer(dataArray, bufferLength);
                
                // Progress Bar animation logic
                let startTime = Date.now();
                let progressInterval = setInterval(() => {
                    let elapsed = Date.now() - startTime;
                    let percent = Math.min((elapsed / RECORDING_TIME) * 100, 100);
                    progressFill.style.width = percent + '%';
                    
                    // Sample pitch
                    startPitchDetection();
                }, 50);

                setTimeout(() => {
                    clearInterval(progressInterval);
                    stopAnalysis(stream);
                }, RECORDING_TIME);

            } catch (err) {
                console.error('Error accessing microphone:', err);
                statusText.innerText = 'Microphone access denied or error occurred.';
            }
        }

        function stopAnalysis(stream) {
            isRecording = false;
            
            // Stop tracks
            stream.getTracks().forEach(track => track.stop());
            
            // Update UI
            recordBtn.classList.remove('recording');
            micWrapper.classList.remove('recording');
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
            
            if (pitchSamples.length < MIN_SAMPLES) {
                statusText.innerText = 'Not enough voice data detected. Try again louder.';
                resultPanel.style.display = 'none';
            } else {
                statusText.innerText = 'Analysis Complete';
                
                // Calculate average pitch (filtering out extremes)
                pitchSamples.sort((a,b) => a-b);
                // Remove top and bottom 10% outliers
                let trimCount = Math.floor(pitchSamples.length * 0.1);
                let validSamples = pitchSamples.slice(trimCount, pitchSamples.length - trimCount);
                
                let sum = validSamples.reduce((a, b) => a + b, 0);
                let avg = sum / validSamples.length;
                
                let result = determineGender(avg);
                
                genderResult.innerText = result.text;
                genderResult.className = `result-value ${result.class}`;
                pitchValue.innerText = avg.toFixed(1);
                
                resultPanel.style.display = 'block';
                
                // Force triggering animation
                resultPanel.style.animation = 'none';
                resultPanel.offsetHeight; // trigger reflow
                resultPanel.style.animation = null; 
            }
        }

        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                startAnalysis();
            }
        });

        // Initialize empty visualizer
        function initEmptyVisualizer() {
            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 3;
            let gradient = canvasCtx.createLinearGradient(0, 0, canvas.width, 0);
            gradient.addColorStop(0, "#00f2fe");
            gradient.addColorStop(1, "#4facfe");
            canvasCtx.strokeStyle = gradient;
            canvasCtx.beginPath();
            canvasCtx.moveTo(0, canvas.height / 2);
            canvasCtx.lineTo(canvas.width, canvas.height / 2);
            canvasCtx.stroke();
        }
        
        setTimeout(initEmptyVisualizer, 100);

    </script>
</body>
</html>
