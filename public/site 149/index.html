<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site 149 - Deep Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="space-container">
        <!-- Parallax layers -->
        <div class="parallax-layer layer-bg" data-speed="0.1"></div>
        <div class="parallax-layer layer-1" data-speed="0.3"></div>
        <div class="parallax-layer layer-2" data-speed="0.6"></div>
        <div class="parallax-layer layer-3" data-speed="1.2"></div>
        
        <!-- Interactive Elements -->
        <div class="cards-container">
            <div class="glass-card" data-speed="0.05">
                <h2>Astral</h2>
                <p>Navigating the infinite expanse through elegant interface design.</p>
            </div>
            <div class="glass-card" data-speed="0.08">
                <h2>Nebula</h2>
                <p>Where form meets void, structure is born from chaos.</p>
            </div>
            <div class="glass-card" data-speed="0.12">
                <h2>Zenith</h2>
                <p>The pinnacle of observation, isolated from the noise.</p>
            </div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>

    <script src="script.js"></script>
</body>
</html>
