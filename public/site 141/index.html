<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site 141 - Liquid Glass Morphism</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="blob-bg blob-1"></div>
    <div class="blob-bg blob-2"></div>
    <div class="blob-bg blob-3"></div>

    <div class="interactive-light"></div>

    <nav class="navbar">
        <div class="logo">LUMEN</div>
        <div class="links">
            <a href="#">Work</a>
            <a href="#">Studio</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <main class="glass-container">
        <div class="glass-card main-card">
            <span class="tag">002 UI</span>
            <h1>Refracted Reality</h1>
            <p>Embracing the fluidity of digital spaces through simulated translucency and shifting light patterns.</p>
            <button class="glass-btn">Explore Concept</button>
        </div>

        <div class="cards-grid">
            <div class="glass-card small-card">
                <div class="card-icon">✧</div>
                <h3>Clarity</h3>
                <p>Diffusing complex data over elegant interfaces.</p>
            </div>
            <div class="glass-card small-card">
                <div class="card-icon">✦</div>
                <h3>Depth</h3>
                <p>Creating spatial layering without visual clutter.</p>
            </div>
            <div class="glass-card small-card span-2">
                <h3>Fluidity</h3>
                <div class="gradient-bar"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
